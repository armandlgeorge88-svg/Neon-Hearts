<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Hearts</title>
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#ff2d95">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            color: white;
            font-family: system-ui, sans-serif;
            text-align: center;
            padding-top: 80px;
        }
        h1 {
            font-size: 3em;
            background: linear-gradient(90deg, #ff2d95, #00f2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.2em;
            opacity: 0.8;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Neon Hearts</h1>
    <p>Big energy.<br>Real sparks.<br>No games.</p>
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
